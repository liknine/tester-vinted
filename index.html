<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Sniper</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
<div class="glow glow-1"></div>
<div class="glow glow-2"></div>
<div class="app">

  <!-- SEARCH -->
  <div class="page active" id="tabSearch">
    <div class="header">
      <h1>Поиск</h1>
      <p class="sub">Создай засаду на любую вещь</p>
    </div>
    <div class="glass" id="formCard">
      <div class="glass-top">
        <span class="glass-title" id="formTitle">Новая засада</span>
        <button class="close-btn hidden" id="cancelEditBtn" type="button">&times;</button>
      </div>
      <form id="searchForm" autocomplete="off">
        <div class="field">
          <label>Запрос</label>
          <input id="query" type="text" placeholder="bape tiger, nike dunk..." maxlength="120" required>
          <span class="hint">Бот подберёт варианты автоматически</span>
        </div>
        <div class="field">
          <label>Регионы</label>
          <div class="regions" id="regionGrid"></div>
        </div>
        <div class="g2">
          <div class="field"><label>Категория</label>
            <select id="category"><option value="all">Все</option><option value="clothes">Одежда</option><option value="shoes">Обувь</option></select>
          </div>
          <div class="field"><label>Размер</label><input id="size" type="text" placeholder="M, L, XL / 42"></div>
        </div>
        <div class="g3">
          <div class="field"><label>Мин. цена</label><input id="min_price" type="number" min="0" placeholder="0"></div>
          <div class="field"><label>Макс. цена</label><input id="max_price" type="number" min="0" placeholder="500"></div>
          <div class="field"><label>Исключить</label><input id="minus_words" type="text" placeholder="kids, fake"></div>
        </div>
        <div class="field"><label>Состояние</label><div class="chips" id="condChips"></div></div>
        <button type="submit" class="accent-btn" id="submitBtn">Создать засаду</button>
      </form>
    </div>
  </div>

  <!-- PROFILE -->
  <div class="page" id="tabProfile">
    <div class="header"><h1>Профиль</h1><p class="sub">Аккаунт и засады</p></div>
    <div class="glass ava-card">
      <div class="ava" id="profileAvatar"><span id="avaLetter">?</span><img id="avaImg" class="hidden" alt=""></div>
      <div class="ava-name" id="profileName">—</div>
      <div class="ava-sub" id="profileUsername">—</div>
    </div>
    <div class="metrics">
      <div class="metric-card"><span class="mc-label">ID</span><span class="mc-val" id="statId">—</span></div>
      <div class="metric-card"><span class="mc-label">Premium</span><span class="mc-val" id="statPremium">—</span></div>
      <div class="metric-card"><span class="mc-label">Дней</span><span class="mc-val" id="statDays">—</span></div>
      <div class="metric-card"><span class="mc-label">Засад</span><span class="mc-val" id="statSearches">—</span></div>
    </div>
    <div class="glass">
      <div class="glass-top"><span class="glass-title">Активные засады</span><span class="badge" id="searchCount">0</span></div>
      <div id="searchList"></div>
    </div>
    <div class="glass cta">
      <div class="cta-left"><div class="cta-t">Для выкупа пиши мне!</div><div class="cta-s">Помогу забрать любую вещь</div></div>
      <button class="accent-btn sm" id="contactBtn">Написать</button>
    </div>
  </div>

  <!-- SUB -->
  <div class="page" id="tabSub">
    <div class="header"><h1>Подписка</h1><p class="sub">Выбери план</p></div>
    <div class="glass status-card">
      <div class="status-dot" id="subDot"></div>
      <div><div class="status-t" id="subTitle">Не активен</div><div class="status-s" id="subDesc">Оформи подписку</div></div>
    </div>
    <div id="plansList"></div>
  </div>

  <!-- NAV -->
  <nav class="tab-bar">
    <button class="tab active" data-tab="tabSearch">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg>
      <span>Поиск</span>
    </button>
    <button class="tab" data-tab="tabProfile">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span>Профиль</span>
    </button>
    <button class="tab" data-tab="tabSub">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2z"/></svg>
      <span>Premium</span>
    </button>
  </nav>
</div>
<div class="toast hidden" id="toast"></div>
<script src="app.js"></script>
</body>
</html>
